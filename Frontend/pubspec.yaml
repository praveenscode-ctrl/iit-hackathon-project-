name: assignhub
description: AssignHub — role-based assignment management platform

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  go_router: ^13.2.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  web_socket_channel: ^2.4.0
  file_picker: ^8.0.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  http: ^1.2.1
  url_launcher: ^6.3.2
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
